name: deploy-web

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-web.yml'
      - 'core/**'
      - 'service/**'
      - 'web/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-web-production
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://codiff.dev

    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 24
          cache: true
          run-install: true

      - name: Build website
        run: |
          vp run --filter '@nkzw/codiff-core' build
          vp run --filter '@nkzw/codiff-service' build
          vp run --filter '@nkzw/codiff-web' build

      - name: Deploy website
        working-directory: web
        env:
          AUTH_GITHUB_CLIENT_ID: ${{ secrets.AUTH_GITHUB_CLIENT_ID }}
          AUTH_GITHUB_CLIENT_SECRET: ${{ secrets.AUTH_GITHUB_CLIENT_SECRET }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          secrets_file="${RUNNER_TEMP}/codiff-worker-secrets.json"
          trap 'rm -f "$secrets_file"' EXIT

          node --input-type=module - "$secrets_file" <<'NODE'
          import { writeFileSync } from 'node:fs';

          const names = [
            'AUTH_GITHUB_CLIENT_ID',
            'AUTH_GITHUB_CLIENT_SECRET',
            'BETTER_AUTH_SECRET',
          ];
          const missing = names.filter((name) => !process.env[name]);

          if (missing.length > 0) {
            throw new Error(`Missing production secrets: ${missing.join(', ')}`);
          }

          writeFileSync(
            process.argv[2],
            JSON.stringify(Object.fromEntries(names.map((name) => [name, process.env[name]]))),
            { mode: 0o600 },
          );
          NODE

          if ! vp exec wrangler d1 info DB --json >/dev/null 2>&1; then
            vp exec wrangler d1 create codiff-public
          fi

          if ! vp exec wrangler r2 bucket info codiff-public-shares --json >/dev/null 2>&1; then
            vp exec wrangler r2 bucket create codiff-public-shares
          fi

          vp exec wrangler d1 migrations apply DB --remote
          vp exec wrangler deploy \
            --message "GitHub ${GITHUB_SHA}" \
            --secrets-file "$secrets_file"
