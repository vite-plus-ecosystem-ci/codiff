packages:
  - core
  - service
  - web

allowBuilds:
  '@google/genai': false
  '@nkzw/mdx-editor': true
  '@swc/core': true
  better-sqlite3: true
  electron: true
  electron-winstaller: true
  esbuild: true
  node-pty: true
  protobufjs: false
  sharp: true
  workerd: true
blockExoticSubdeps: false
minimumReleaseAgeExclude:
  - '@nkzw/*'
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@0.0.0-commit.9855245a469b178066c25a5d45c971c130565d89
  vite-plus: 0.0.0-commit.9855245a469b178066c25a5d45c971c130565d89
  vitest: 4.1.10
nodeLinker: hoisted
onlyBuiltDependencies:
  - '@nkzw/mdx-editor'
  - '@swc/core'
  - electron
  - electron-winstaller
  - unrs-resolver
overrides:
  extract-zip>yauzl: ^3.4.0
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
